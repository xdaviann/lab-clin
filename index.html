<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sistema Web de Atención y Gestión Administrativa para Laboratorio Clínico. Gestión de pacientes, órdenes, resultados, facturación y reportes." />
  <meta name="theme-color" content="#1A1D29" />
  <title>LabClínica — Sistema de Gestión de Laboratorio</title>

  <link rel="icon" type="image/png" href="assets/logo.png" />

  <!-- Design System CSS -->
  <link rel="stylesheet" href="css/tokens.css?v=4.7" />
  <link rel="stylesheet" href="css/base.css?v=4.7" />
  <link rel="stylesheet" href="css/components.css?v=4.7" />
  <link rel="stylesheet" href="css/layout.css?v=4.7" />
</head>
<body>
  <!-- App Root -->
  <div id="app">
    <!-- Loading screen shown while scripts load -->
    <div style="display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--color-surface-dark);">
      <div style="text-align: center;">
        <img src="assets/logo.png" alt="Logo" style="width: 80px; height: 80px; margin-bottom: 24px; animation: pulse 2s ease-in-out infinite;" />
        <div style="color: var(--color-white); font-family: 'Inter', sans-serif; font-size: 1.25rem; font-weight: 600;">LabClínica</div>
        <div style="color: var(--color-surface-400); font-family: 'Inter', sans-serif; font-size: 0.8125rem; margin-top: 4px;">Cargando sistema...</div>
      </div>
    </div>
  </div>

  <!-- PDF Generation Libraries (CDN for reliability) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  
  <!-- Chart.js for Analytics Dashboard -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- JavaScript Modules (order matters: libs → services → components → pages → app) -->
  <!-- Lib Layer -->
  <script src="js/lib/icons.js?v=4.7"></script>
  <script src="js/lib/router.js?v=4.7"></script>
  <script src="js/lib/store.js?v=4.7"></script>
  <script src="js/lib/toast.js?v=4.7"></script>
  <script src="js/lib/pdf.js?v=4.7"></script>

  <!-- Service Layer -->
  <script src="js/services/demoData.js?v=4.7"></script>
  <script src="js/services/currency.js?v=4.7"></script>

  <!-- Component Layer -->
  <script src="js/components/sidebar.js?v=4.7"></script>
  <script src="js/components/topbar.js?v=4.7"></script>
  <script src="js/components/modal.js?v=4.7"></script>

  <!-- Page Layer -->
  <script src="js/pages/login.js?v=4.7"></script>
  <script src="js/pages/dashboard.js?v=4.7"></script>
  <script src="js/pages/pacientes.js?v=4.7"></script>
  <script src="js/pages/ordenes.js?v=4.7"></script>
  <script src="js/pages/resultados.js?v=4.7"></script>
  <script src="js/pages/facturacion.js?v=4.7"></script>
  <script src="js/pages/reportes.js?v=4.7"></script>
  <script src="js/pages/analytics.js?v=4.7"></script>
  <script src="js/pages/usuarios.js?v=4.7"></script>
  <script src="js/pages/configuracion.js?v=4.7"></script>
  <script src="js/pages/pruebas.js?v=4.7"></script>

  <!-- App Entry Point -->
  <script src="js/app.js?v=4.7"></script>
</body>
</html>
